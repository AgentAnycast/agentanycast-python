name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  proto-freshness:
    name: Proto Stubs Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-setup-action@v1

      - name: Checkout proto repo
        uses: actions/checkout@v4
        with:
          repository: AgentAnycast/agentanycast-proto
          path: agentanycast-proto

      - name: Regenerate Python stubs
        run: |
          cd agentanycast-proto
          cat > buf.gen.python.yaml << 'GEN'
          version: v2
          plugins:
            - remote: buf.build/protocolbuffers/python
              out: gen/python
            - remote: buf.build/grpc/python
              out: gen/python
          GEN
          buf generate --template buf.gen.python.yaml

      - name: Check for differences
        run: |
          diff -r agentanycast-proto/gen/python/agentanycast/ src/agentanycast/_generated/agentanycast/ \
            || (echo "::error::Generated stubs are out of date. Run 'buf generate' in agentanycast-proto and copy gen/python/ to src/agentanycast/_generated/." && exit 1)

  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  type-check:
    name: Mypy Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Mypy
        run: mypy src/ --ignore-missing-imports

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -v
